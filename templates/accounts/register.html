{% extends 'base.html' %}

{% block title %}Create Account - AppointPro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <i class="fas fa-calendar-check text-blue-600 text-5xl"></i>
            <h2 class="mt-4 text-3xl font-bold text-gray-900">Create Account</h2>
            <p class="text-gray-600">Start managing your appointments today</p>
        </div>
        
        <div class="bg-white rounded-lg shadow p-8">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <!-- Account Type Selection -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        I want to
                    </label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="border rounded-lg p-4 cursor-pointer hover:border-blue-500 text-center">
                            <input type="radio" name="role" value="customer" class="hidden" checked>
                            <i class="fas fa-user text-2xl mb-2"></i>
                            <p class="font-medium">Book Appointments</p>
                        </label>
                        <label class="border rounded-lg p-4 cursor-pointer hover:border-blue-500 text-center">
                            <input type="radio" name="role" value="business_owner" class="hidden">
                            <i class="fas fa-store text-2xl mb-2"></i>
                            <p class="font-medium">List My Business</p>
                        </label>
                    </div>
                </div>
                
                <!-- Business Name (shown only for business owners) -->
                <div id="businessNameField" class="hidden">
                    <label for="business_name" class="block text-sm font-medium text-gray-700 mb-2">
                        Business Name
                    </label>
                    <input type="text" name="business_name" id="business_name" 
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                           placeholder="e.g., Salon & Spa">
                </div>
                
                <!-- Personal Information -->
                <div>
                    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">
                        Full Name
                    </label>
                    <input type="text" name="full_name" id="full_name" required 
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                           placeholder="John Doe">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input type="email" name="email" id="email" required 
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                           placeholder="you@example.com">
                </div>
                
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                        Phone Number
                    </label>
                    <input type="tel" name="phone" id="phone" required 
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                           placeholder="(555) 123-4567">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <input type="password" name="password1" id="password" required 
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                           placeholder="••••••••">
                </div>
                
                <div>
                    <label for="password2" class="block text-sm font-medium text-gray-700 mb-2">
                        Confirm Password
                    </label>
                    <input type="password" name="password2" id="password2" required 
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                           placeholder="••••••••">
                </div>
                
                <!-- Terms and Conditions -->
                <div class="flex items-center">
                    <input type="checkbox" name="terms" id="terms" required 
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="terms" class="ml-2 block text-sm text-gray-900">
                        I agree to the 
                        <a href="#" class="text-blue-600 hover:text-blue-500">Terms of Service</a> 
                        and 
                        <a href="#" class="text-blue-600 hover:text-blue-500">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" 
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition-all">
                    Create Account
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Already have an account? 
                    <a href="{% url 'accounts:login' %}" class="text-blue-600 hover:text-blue-500 font-medium">
                        Sign in
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const roleRadios = document.querySelectorAll('input[name="role"]');
    const businessNameField = document.getElementById('businessNameField');
    
    roleRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            if (this.value === 'business_owner') {
                businessNameField.classList.remove('hidden');
            } else {
                businessNameField.classList.add('hidden');
            }
        });
    });
});
</script>
{% endblock %}
